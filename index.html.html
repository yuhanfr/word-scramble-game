<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordScramble — Educational Game</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --accent2: #ff3c00;
    --text: #f0f0f0;
    --muted: #555;
    --green: #00ff7f;
    --red: #ff3c00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier Prime', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    z-index: 9999;
  }

  /* Grid lines background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 48px;
    position: relative;
  }

  .logo-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 12vw, 96px);
    letter-spacing: 6px;
    line-height: 0.9;
    color: var(--text);
    position: relative;
    display: inline-block;
  }

  h1 span {
    color: var(--accent);
    position: relative;
  }

  h1::after {
    content: 'WORD';
    position: absolute;
    top: 4px;
    left: 4px;
    color: var(--accent2);
    opacity: 0.15;
    z-index: -1;
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 12px;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 2px;
    margin-bottom: 32px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .stat {
    flex: 1;
    background: var(--surface);
    padding: 14px 16px;
    text-align: center;
    border-right: 1px solid var(--border);
    transition: background 0.2s;
  }
  .stat:last-child { border-right: none; }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--accent);
    line-height: 1;
    display: block;
  }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* CATEGORY SELECTOR */
  .category-section {
    margin-bottom: 28px;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .categories {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .cat-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 8px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .cat-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cat-btn.active {
    border-color: var(--accent);
    color: var(--bg);
    background: var(--accent);
  }

  /* GAME CARD */
  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 36px 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .game-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent), transparent);
  }

  .hint-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .word-hint {
    font-size: 14px;
    color: var(--text);
    letter-spacing: 1px;
    margin-bottom: 32px;
    line-height: 1.5;
    border-left: 2px solid var(--accent);
    padding-left: 14px;
  }

  /* SCRAMBLED LETTERS */
  .scrambled-display {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 32px;
  }

  .letter-tile {
    width: 52px;
    height: 58px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.12s;
    position: relative;
    user-select: none;
    letter-spacing: 0;
  }

  .letter-tile:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(232,255,0,0.15);
  }

  .letter-tile.selected {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    transform: translateY(-4px);
  }

  .letter-tile.used {
    opacity: 0.2;
    pointer-events: none;
    transform: none;
  }

  /* ANSWER SLOTS */
  .answer-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
    min-height: 66px;
    align-items: center;
  }

  .answer-slot {
    width: 52px;
    height: 58px;
    border: 1px solid var(--border);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.12s;
    position: relative;
  }

  .answer-slot:empty::after {
    content: '_';
    color: var(--border);
    font-size: 24px;
  }

  .answer-slot:not(:empty) {
    border-color: var(--accent);
    background: rgba(232,255,0,0.05);
  }

  .answer-slot:not(:empty):hover {
    border-color: var(--accent2);
    background: rgba(255,60,0,0.08);
    color: var(--accent2);
  }

  .answer-slot.correct-anim {
    animation: correctFlash 0.4s ease;
  }

  @keyframes correctFlash {
    0% { background: rgba(0,255,127,0.4); border-color: var(--green); }
    100% { background: rgba(232,255,0,0.05); border-color: var(--accent); }
  }

  /* BUTTONS */
  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    min-width: 120px;
    padding: 14px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    font-weight: 700;
  }
  .btn-primary:hover {
    background: transparent;
    color: var(--accent);
  }

  .btn-secondary {
    background: transparent;
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-secondary:hover {
    border-color: var(--text);
    color: var(--text);
  }

  .btn-danger {
    background: transparent;
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .btn-danger:hover {
    background: var(--accent2);
    color: var(--bg);
  }

  /* FEEDBACK */
  .feedback {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    height: 32px;
    margin-bottom: 8px;
    transition: all 0.3s;
  }
  .feedback.correct { color: var(--green); }
  .feedback.wrong { color: var(--red); }

  /* PROGRESS */
  .progress-wrap {
    margin-bottom: 24px;
  }

  .progress-bar {
    height: 3px;
    background: var(--surface2);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-top: 6px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* WORD INFO */
  .word-info-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--green);
    padding: 18px 20px;
    margin-bottom: 20px;
    display: none;
    animation: slideIn 0.3s ease;
  }

  .word-info-card.show { display: block; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .word-answer {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--green);
    letter-spacing: 4px;
    margin-bottom: 6px;
  }

  .word-def {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    opacity: 0.8;
  }

  .word-category-tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    padding: 3px 8px;
    background: rgba(0,255,127,0.1);
    border: 1px solid rgba(0,255,127,0.3);
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* GAME OVER SCREEN */
  .game-over {
    display: none;
    text-align: center;
    padding: 48px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .game-over::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(232,255,0,0.05) 0%, transparent 70%);
  }

  .game-over.show { display: block; }

  .game-over h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    letter-spacing: 8px;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .final-score {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .final-score strong {
    color: var(--text);
    font-size: 20px;
  }

  /* SCROLL */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  /* RESPONSIVE */
  @media (max-width: 500px) {
    .letter-tile, .answer-slot { width: 42px; height: 48px; font-size: 22px; }
    .game-card { padding: 24px 16px; }
    h1 { font-size: 56px; }
  }

  /* Animations */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .shake { animation: shake 0.4s ease; }

  @keyframes pulse-accent {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232,255,0,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(232,255,0,0); }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-tag">// Educational Game v1.0</div>
    <h1><span>WORD</span>SCRAMBLE</h1>
    <p class="subtitle">Unscramble the letters — build your vocabulary</p>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <span class="stat-val" id="scoreVal">0</span>
      <span class="stat-label">Score</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="wordNumVal">1</span>
      <span class="stat-label">Word</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="streakVal">0</span>
      <span class="stat-label">Streak</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="hintVal">3</span>
      <span class="stat-label">Hints</span>
    </div>
  </div>

  <div class="category-section">
    <div class="section-label">Category</div>
    <div class="categories" id="categories"></div>
  </div>

  <div class="progress-wrap">
    <div class="section-label">Progress <span id="progressLabel" style="color:var(--muted);font-family:'Courier Prime';text-transform:none;letter-spacing:0;">1 / 10</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="word-info-card" id="wordInfo">
    <div class="word-category-tag" id="infoCategory"></div>
    <div class="word-answer" id="infoWord"></div>
    <div class="word-def" id="infoDef"></div>
  </div>

  <div class="game-card" id="gameCard">
    <div class="hint-text">// CLUE</div>
    <div class="word-hint" id="wordHint">Loading...</div>

    <div class="section-label">Your Answer</div>
    <div class="answer-row" id="answerRow"></div>

    <div class="section-label">Scrambled Letters</div>
    <div class="scrambled-display" id="scrambledDisplay"></div>

    <div class="btn-row" style="margin-top:8px;">
      <button class="btn btn-secondary" onclick="useHint()">// HINT</button>
      <button class="btn btn-secondary" onclick="clearAnswer()">CLEAR</button>
      <button class="btn btn-primary" onclick="checkAnswer()">SUBMIT →</button>
    </div>
    <div class="btn-row" style="margin-top:8px;">
      <button class="btn btn-danger" onclick="skipWord()">SKIP WORD</button>
      <button class="btn btn-secondary" onclick="shuffleScrambled()">SHUFFLE</button>
    </div>
  </div>

  <div class="game-over" id="gameOver">
    <h2>GAME OVER</h2>
    <div class="final-score">Final Score: <strong id="finalScore">0</strong> pts</div>
    <div class="final-score" style="margin-top:-20px;margin-bottom:32px;">Words Correct: <strong id="finalCorrect">0</strong></div>
    <button class="btn btn-primary" style="width:100%;max-width:300px;margin:0 auto;display:block;" onclick="restartGame()">PLAY AGAIN →</button>
  </div>

</div>

<script>

  English: [
    { word: "METAPHOR", hint: "A figure of speech where a word or phrase is applied to an object it doesn't literally denote.", def: "A metaphor directly describes one thing as another unlike thing, used to imply a resemblance, e.g. 'Life is a journey.'" },
    { word: "SYNONYM", hint: "A word or phrase that means the same as another.", def: "Synonyms are words with the same or nearly the same meaning, like 'happy' and 'joyful.'" },
    { word: "NARRATIVE", hint: "A spoken or written account of connected events — a story.", def: "A narrative is a sequence of events told in story form, with characters, setting, conflict, and resolution." },
    { word: "PRONOUN", hint: "A word used in place of a noun — like 'he', 'she', or 'they'.", def: "Pronouns replace nouns to avoid repetition. Types include personal, possessive, reflexive, and relative pronouns." },
    { word: "DIALECT", hint: "A particular form of a language specific to a region or social group.", def: "A dialect is a variety of a language distinguished by vocabulary, grammar, and pronunciation, used in a particular area." },
    { word: "RHYME", hint: "When two or more words end with the same sound.", def: "Rhyme is the correspondence of sound between words or the endings of words, especially when used in poetry." },
    { word: "SYLLABLE", hint: "A unit of pronunciation with one vowel sound.", def: "A syllable is a unit of sound in a word that contains one vowel sound, like the three syllables in 'el-e-phant.'" },
    { word: "ANTHOLOGY", hint: "A published collection of writings, stories, or poems.", def: "An anthology is a curated collection of literary works, such as poems, short stories, or plays, selected by an editor." },
    { word: "ALLEGORY", hint: "A story with a deeper symbolic meaning behind the literal one.", def: "An allegory is a narrative where characters and events represent abstract ideas or moral qualities beyond the surface story." },
    { word: "IRONY", hint: "When the intended meaning is opposite to the literal meaning.", def: "Irony is a literary device where words convey the opposite of their literal meaning, or where outcomes are contrary to expectations." },
  ],
};

const CATEGORIES = Object.keys(WORD_BANK);
let currentCategory = CATEGORIES[0];
let wordQueue = [];
let currentWord = null;
let selectedLetters = [];
let usedIndices = [];
let score = 0;
let streak = 0;
let wordNum = 1;
let hints = 3;
let totalWords = 10;
let gameActive = true;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initCategories() {
  const container = document.getElementById('categories');
  container.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === currentCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      currentCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      restartGame();
    };
    container.appendChild(btn);
  });
}

function buildQueue() {
  const words = [...WORD_BANK[currentCategory]];
  wordQueue = shuffle(words).slice(0, totalWords);
}

function startGame() {
  gameActive = true;
  document.getElementById('gameCard').style.display = 'block';
  document.getElementById('gameOver').classList.remove('show');
  document.getElementById('wordInfo').classList.remove('show');
  setFeedback('', '');
  loadNextWord();
}

function loadNextWord() {
  if (wordNum > totalWords || wordQueue.length === 0) {
    endGame();
    return;
  }
  document.getElementById('wordInfo').classList.remove('show');

  currentWord = wordQueue[wordNum - 1];
  selectedLetters = [];
  usedIndices = [];

  document.getElementById('wordHint').textContent = currentWord.hint;
  document.getElementById('wordNumVal').textContent = wordNum;
  document.getElementById('progressLabel').textContent = wordNum + ' / ' + totalWords;
  document.getElementById('progressFill').style.width = (wordNum / totalWords * 100) + '%';

  renderAnswerSlots();
  renderScrambled();
  setFeedback('', '');
}

function renderScrambled() {
  const letters = currentWord.word.split('');
  const scrambled = shuffle(letters);
  const container = document.getElementById('scrambledDisplay');
  container.innerHTML = '';
  scrambled.forEach((letter, idx) => {
    const tile = document.createElement('div');
    tile.className = 'letter-tile';
    tile.textContent = letter;
    tile.dataset.idx = idx;
    tile.dataset.letter = letter;
    tile.onclick = () => selectLetter(tile, idx);
    container.appendChild(tile);
  });
}

function shuffleScrambled() {
  // Get remaining (unused) tiles and re-shuffle their DOM order
  const container = document.getElementById('scrambledDisplay');
  const tiles = [...container.querySelectorAll('.letter-tile:not(.used)')];
  tiles.forEach(t => container.removeChild(t));
  shuffle(tiles).forEach(t => container.appendChild(t));
}

function renderAnswerSlots() {
  const row = document.getElementById('answerRow');
  row.innerHTML = '';
  for (let i = 0; i < currentWord.word.length; i++) {
    const slot = document.createElement('div');
    slot.className = 'answer-slot';
    slot.dataset.slotIdx = i;
    slot.onclick = () => removeFromSlot(i);
    row.appendChild(slot);
  }
}

function selectLetter(tile, idx) {
  if (tile.classList.contains('used')) return;
  const emptySlotIdx = selectedLetters.length;
  if (emptySlotIdx >= currentWord.word.length) return;

  tile.classList.add('used', 'selected');
  selectedLetters.push({ letter: tile.dataset.letter, tileIdx: idx });
  usedIndices.push(idx);

  const slot = document.querySelector(`.answer-slot[data-slot-idx="${emptySlotIdx}"]`);
  if (slot) {
    slot.textContent = tile.dataset.letter;
    slot.dataset.tileIdx = idx;
  }
}

function removeFromSlot(slotIdx) {
  if (slotIdx >= selectedLetters.length) return;

  // Remove from slotIdx onwards
  const removed = selectedLetters.splice(slotIdx);
  usedIndices = selectedLetters.map(s => s.tileIdx);

  // Clear those slots visually
  for (let i = slotIdx; i < currentWord.word.length; i++) {
    const slot = document.querySelector(`.answer-slot[data-slot-idx="${i}"]`);
    if (slot) { slot.textContent = ''; delete slot.dataset.tileIdx; }
  }

  // Re-fill slots from remaining selected
  selectedLetters.forEach((s, i) => {
    if (i >= slotIdx) {
      const slot = document.querySelector(`.answer-slot[data-slot-idx="${i}"]`);
      if (slot) { slot.textContent = s.letter; slot.dataset.tileIdx = s.tileIdx; }
    }
  });

  // Un-mark removed tiles
  removed.forEach(s => {
    const tile = document.querySelector(`.letter-tile[data-idx="${s.tileIdx}"]`);
    if (tile) tile.classList.remove('used', 'selected');
  });
}

function clearAnswer() {
  selectedLetters = [];
  usedIndices = [];
  renderAnswerSlots();
  document.querySelectorAll('.letter-tile').forEach(t => t.classList.remove('used', 'selected'));
}

function checkAnswer() {
  if (selectedLetters.length < currentWord.word.length) {
    setFeedback('Fill all letters first!', 'wrong');
    document.getElementById('answerRow').classList.add('shake');
    setTimeout(() => document.getElementById('answerRow').classList.remove('shake'), 400);
    return;
  }

  const userAnswer = selectedLetters.map(s => s.letter).join('');
  if (userAnswer === currentWord.word) {
    // Correct
    const points = 10 + streak * 2;
    score += points;
    streak++;
    updateStats();
    setFeedback(`✓ CORRECT! +${points} PTS`, 'correct');
    showWordInfo();
    setTimeout(() => { wordNum++; loadNextWord(); }, 2200);
  } else {
    streak = 0;
    updateStats();
    setFeedback('✗ WRONG — TRY AGAIN', 'wrong');
    document.getElementById('gameCard').classList.add('shake');
    setTimeout(() => document.getElementById('gameCard').classList.remove('shake'), 400);
  }
}

function useHint() {
  if (hints <= 0) { setFeedback('No hints left!', 'wrong'); return; }
  // Find first empty slot
  const nextIdx = selectedLetters.length;
  if (nextIdx >= currentWord.word.length) return;

  const correctLetter = currentWord.word[nextIdx];
  // Find an unselected tile with this letter
  const tiles = document.querySelectorAll('.letter-tile:not(.used)');
  for (const tile of tiles) {
    if (tile.dataset.letter === correctLetter) {
      hints--;
      document.getElementById('hintVal').textContent = hints;
      selectLetter(tile, parseInt(tile.dataset.idx));
      setFeedback(`Hint used! Letter: ${correctLetter}`, 'correct');
      return;
    }
  }
}

function skipWord() {
  streak = 0;
  updateStats();
  setFeedback('Word skipped.', 'wrong');
  showWordInfo();
  setTimeout(() => { wordNum++; loadNextWord(); }, 1800);
}

function showWordInfo() {
  const card = document.getElementById('wordInfo');
  document.getElementById('infoCategory').textContent = currentCategory;
  document.getElementById('infoWord').textContent = currentWord.word;
  document.getElementById('infoDef').textContent = currentWord.def;
  card.classList.add('show');
}

function setFeedback(msg, type) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.className = 'feedback ' + (type || '');
}

function updateStats() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('streakVal').textContent = streak;
  document.getElementById('hintVal').textContent = hints;
}

function endGame() {
  gameActive = false;
  document.getElementById('gameCard').style.display = 'none';
  document.getElementById('wordInfo').classList.remove('show');
  const go = document.getElementById('gameOver');
  go.classList.add('show');
  document.getElementById('finalScore').textContent = score;
  const correct = Math.max(0, wordNum - 1 - (streak === 0 ? 0 : 0));
  document.getElementById('finalCorrect').textContent = score > 0 ? Math.ceil(score / 10) : 0;
}

function restartGame() {
  score = 0; streak = 0; wordNum = 1; hints = 3;
  updateStats();
  buildQueue();
  document.getElementById('gameCard').style.display = 'block';
  document.getElementById('gameOver').classList.remove('show');
  startGame();
}

// Init
initCategories();
buildQueue();
startGame();
</script>
